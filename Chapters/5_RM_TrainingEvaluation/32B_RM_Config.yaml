# CUDA_VISIBLE_DEVICES=0,1,2,3,4,5,6,7 WANDB_API_KEY=<YOUR_WANDB_KEY> axolotl train <PATH_TO_CONFIG>

base_model: unsloth/Qwen3-32B
model_type: AutoModelForSequenceClassification
num_labels: 1
center_rewards_coefficient: 0.001
tokenizer_type: AutoTokenizer
hf_use_auth_token: true
plugins:
  - axolotl.integrations.liger.LigerPlugin

liger_rope: true
liger_rms_norm: true
liger_glu_activation: true
liger_layer_norm: true
liger_fused_linear_cross_entropy: true

load_in_8bit: false
load_in_4bit: false
strict: false

reward_model: true
chat_template: qwen3
datasets:
  - path: project-themis/Themis-GeneralPreference
    type: bradley_terry.chat_template
    split: train

output_dir: /mnt/fsx/Reward_Modeling/Experiments/Outputs/
remove_unused_columns: false
dataset_processes: 32
dataset_prepared_path: /mnt/fsx/Reward_Modeling/Experiments/data_cache/

sequence_len: 2560
pad_to_sequence_len: true
sample_packing: false
eval_sample_packing: false

wandb_project: <YOUR_WANDB_PROJECT>
wandb_entity: <YOUR_WANDB_ENTITY>
wandb_watch:
wandb_name: <YOUR_WANDB_RUN_NAME>

wandb_log_model:

gradient_accumulation_steps: 2
micro_batch_size: 8
num_epochs: 1
optimizer: adamw_torch_fused
learning_rate: 0.00005
lr_scheduler: cosine
cosine_min_lr_ratio: 0.05
cosine_constant_lr_ratio:
weight_decay: 0.1
warmup_ratio: 0.05
max_grad_norm: 2.0

train_on_inputs: false
group_by_length: false
bf16: true
fp16:
tf32: true

gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
early_stopping_patience:
resume_from_checkpoint:
local_rank:
xformers_attention:
flash_attention: true
flash_attn_cross_entropy: true
flash_attn_rms_norm: true
flash_attn_fuse_qkv: true
flash_attn_fuse_mlp: true

eval_strategy: epoch
save_strategy: epoch
logging_steps: 5
debug:
deepspeed:

fsdp:
  - full_shard
  - auto_wrap
fsdp_version: 1
fsdp_config:
  fsdp_use_orig_params: true
  fsdp_offload_params: true
  fsdp_final_state_dict_type: FULL_STATE_DICT
  fsdp_state_dict_type: FULL_STATE_DICT
  fsdp_transformer_layer_cls_to_wrap: Qwen3DecoderLayer

ddp_bucket_cap_mb: 8192
